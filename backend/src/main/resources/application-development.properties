# ── Logging ───────────────────────────────────────────────────────────────
logging.level.kr.co.kalpa.pcms=DEBUG
logging.level.org.springframework.security=DEBUG

# ── DevTools ──────────────────────────────────────────────────────────────
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ── Swagger (개발 환경에서만 활성화) ──────────────────────────────────────
springdoc.swagger-ui.enable=true

# ── 파일 저장 경로 ─────────────────────────────────────────────────────────
kalpa.pcms.base-dir=./pcms-data
file.upload.base-dir=${kalpa.pcms.base-dir}/uploads
file.upload.attach-files-dir=${file.upload.base-dir}/attachments
file.upload.editor-images-dir=${file.upload.base-dir}/editor-images
file.temp-dir=${kalpa.pcms.base-dir}/temp

# ── 파일 서빙 URL (로컬 개발) ─────────────────────────────────────────────
file.image.base-url=http://localhost:8585/pcms/editor-images/
apnode.file.base-dir=${kalpa.pcms.base-dir}/apnodes
apnode.file.base-url=http://localhost:8585/pcms/apnodes/

