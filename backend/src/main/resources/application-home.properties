# Development Environment
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Thymeleaf - 파일 시스템에서 직접 로드 (DevConfig.java에서 설정)
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false

# DevTools - 자동 재시작 및 LiveReload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/resources/templates/,src/main/resources/static/

# Logging
logging.level.kr.co.kalpa.api=DEBUG


# folders
kalpa.base-dir=./kalpa_data
file.upload.base-dir=${kalpa.base-dir}/uploads
file.upload.attach-files-dir=${file.upload.base-dir}/attachments
file.upload.editor-images-dir=${file.upload.base-dir}/editor/images
file.temp-dir=${kalpa.base-dir}/temp

# image base url
file.image.base-url=http://localhost:8282/editor/images/
# apnode base dir
apnode.file.base-dir=${kalpa.base-dir}/apnodes
apnode.file.base-url=http://localhost:8282/apnodes/