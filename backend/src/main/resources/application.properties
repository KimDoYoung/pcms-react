server.port=8585
server.servlet.context-path=/pcms
# Application
spring.application.name=pcms
spring.application.version=0.1.2
spring.application.description=PCMS API Server


# Database - PostgreSQL 17
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

data.redis.host=${REDIS_HOST}
data.redis.port=${REDIS_PORT}
data.redis.password=${REDIS_PASSWORD}

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=true
jwt.refresh-expiration=604800000
springdoc.swagger-ui.enable=false



# Jackson
spring.jackson.time-zone=Asia/Seoul

# Public Data
public.data.api-key=${PUBLIC_DATA_API_KEY}


# DevTools - 자동 재시작 및 LiveReload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.exclude=src/main/resources/templates/,src/main/resources/static/

# Multipart File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# aview url
aview.url=http://jskn.iptime.org/aview/view